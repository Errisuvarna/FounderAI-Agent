services:
  - type: web
    name: founderai-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: founderai
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: JWT_REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini/gemini-2.5-flash
      - key: GEMINI_EMBEDDING_MODEL
        value: models/text-embedding-004
      - key: SERPER_API_KEY
        sync: false
      - key: CHROMA_PERSIST_DIR
        value: /app/chroma_data
      - key: FRONTEND_ORIGIN
        sync: false
      - key: APP_ENV
        value: production
    healthCheckPath: /health
